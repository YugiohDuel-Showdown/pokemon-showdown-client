server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Disable caching for the main HTML entry points
    location ~* ^/(index|preactalpha)\.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Proxy sprites/audio to PS CDN if not found locally.
    # This regex must come BEFORE the general image rule so it takes priority.
    location ~* ^/(sprites|audio)/ {
        try_files $uri @ps_cdn;
    }

    # Long-term cache for versioned/hashed static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location @ps_cdn {
        proxy_pass https://play.pokemonshowdown.com;
        proxy_set_header Host play.pokemonshowdown.com;
        proxy_ssl_server_name on;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Serve everything else as static files
    location / {
        try_files $uri $uri/ =404;
    }
}
