server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.php index.html;

    # Disable caching for the main HTML entry points
    location ~* ^/(index|preactalpha)\.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Fall back to PS for action.php (login/auth) - same pattern as sprites
    location = /~~showdown/action.php {
        try_files $uri @ps_cdn;
    }

    # Pass PHP files to PHP-FPM
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Proxy sprites/audio to PS CDN if not found locally.
    # This regex must come BEFORE the general image rule so it takes priority.
    location ~* ^/(sprites|audio)/ {
        try_files $uri @ps_cdn;
    }

    # Long-term cache for versioned/hashed static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location @ps_cdn {
        proxy_pass https://play.pokemonshowdown.com;
        proxy_set_header Host play.pokemonshowdown.com;
        proxy_ssl_server_name on;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # SPA fallback: serve index.html for all unmatched paths (client-side routing)
    # No-cache so /teambuilder etc. always get the fresh index.html
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri $uri/ /index.html;
    }
}
